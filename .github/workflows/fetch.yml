
name: Fetch IPTV Channels

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and parse M3U
        run: node parse.js

      - name: Commit channels.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add channels.json
          git diff --staged --quiet || git commit -m "Update channels $(date -u '+%Y-%m-%d %H:%M')"
          git push
